services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloud-copilot-backend
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=none
      - USE_SIMULATED_INGESTION=true
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cloud-copilot-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
